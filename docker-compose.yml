version: '3.8'

services:
  fan-controller:
    image: fan-controller
    container_name: fan-controller
    restart: unless-stopped
    working_dir: /app
    command: python -u fan_control.py
    network_mode: host
    privileged: true  # required for serial access to ESP
    volumes:
      - ${SERIAL_PORT}:${SERIAL_PORT}  # bind-mount ESP serial port
    environment:
      - MIN_TEMP=${MIN_TEMP}
      - MAX_TEMP=${MAX_TEMP}
      - MIN_FAN=${MIN_FAN}
      - MAX_FAN=${MAX_FAN}
      - BAUD_RATE=${BAUD_RATE}
      - LOG_DETAIL=${LOG_DETAIL}
      - SERIAL_PORT=${SERIAL_PORT}
      - TRUENAS_HOST=${TRUENAS_HOST}
      - TRUENAS_API_KEY=${TRUENAS_API_KEY}
    labels:
      com.example.stack: "fan-controller"
      com.example.service: "fan-controller"
      com.fan-controller.description: "ESP8266 fan controller with RPM feedback"
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 30s
      timeout: 5s
      retries: 3
